services:
  app:
    build: . # . means the current directory, which contains the Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ['/app/wait-for-db.sh', 'db', '/app/main']
    ports:
      - "8080:8080"
    volumes:
      - ./migrations:/app/migrations # so my container has access to local migration files
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: